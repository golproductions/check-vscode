name: CI

on:
  push:
  pull_request:

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package gate (extension builds cleanly)
        run: vsce package --out check-vscode-ci.vsix
